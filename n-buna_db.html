<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n-buna 全楽曲データベース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0f12;--bg2:#18181f;--bg3:#22222d;--surface:#2a2a38;
--text:#e8e6e3;--text2:#9e9bab;--text3:#6b6880;
--accent:#7c6fef;--accent2:#a78bfa;--accent-dim:rgba(124,111,239,.12);
--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--gray:#6b7280;
--border:#2e2e3e;
--font:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}

/* Header */
.hero{padding:3rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;
background:linear-gradient(170deg,#0f0f12 0%,#1a1528 40%,#1e1435 70%,#0f0f12 100%)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(ellipse at 30% 50%,rgba(124,111,239,.06) 0%,transparent 50%),
radial-gradient(ellipse at 70% 30%,rgba(167,139,250,.04) 0%,transparent 50%);pointer-events:none}
.hero h1{font-size:2.2rem;font-weight:700;letter-spacing:.08em;color:var(--text);position:relative}
.hero h1 span{color:var(--accent2);font-weight:300}
.hero p.sub{color:var(--text2);margin-top:.5rem;font-size:.9rem;font-weight:300;letter-spacing:.03em;position:relative}
.stats-bar{display:flex;justify-content:center;gap:2rem;margin-top:1.5rem;position:relative}
.stat{text-align:center}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--accent2)}
.stat-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}

/* Controls */
.controls{max-width:1400px;margin:0 auto;padding:1rem 1.5rem}
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap input{width:100%;padding:.75rem 1rem .75rem 2.8rem;background:var(--bg2);border:1px solid var(--border);
border-radius:8px;color:var(--text);font-size:.95rem;font-family:var(--font);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap svg{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text3);width:18px;height:18px}
.filter-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem}
.chip{padding:.35rem .8rem;border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .15s;
border:1px solid var(--border);background:transparent;color:var(--text2);user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent2)}
.chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2);font-weight:500}
.filter-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:.4rem 0;min-width:5rem}
.result-count{font-size:.75rem;color:var(--text3);padding:.3rem 0}

/* Table */
.table-wrap{max-width:1400px;margin:0 auto;padding:0 1.5rem 3rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{position:sticky;top:0;background:var(--bg2);color:var(--text2);font-weight:500;
padding:.65rem .6rem;text-align:left;border-bottom:2px solid var(--accent);cursor:pointer;
white-space:nowrap;user-select:none;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;z-index:10}
thead th:hover{color:var(--accent2)}
thead th .arrow{font-size:.65rem;margin-left:.3rem;opacity:.4}
thead th.sorted .arrow{opacity:1;color:var(--accent2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
td{padding:.55rem .6rem;vertical-align:top}
td.title{font-weight:500;color:var(--text);max-width:220px}
td.vocal{color:var(--text2);max-width:140px}
td.album{color:var(--text2);font-size:.8rem;max-width:280px}
td.date{color:var(--text3);white-space:nowrap;font-variant-numeric:tabular-nums}
td.cat{font-size:.7rem}
td.link a{color:var(--accent2);text-decoration:none;font-size:.78rem;word-break:break-all}
td.link a:hover{text-decoration:underline}
td.note{font-size:.75rem;color:var(--text3);max-width:300px}
td.src{font-size:.72rem;color:var(--text3)}

/* Category badges */
.cat-badge{display:inline-block;padding:.15rem .5rem;border-radius:3px;font-size:.68rem;font-weight:500;letter-spacing:.02em}
.cat-nbuna-vocaloid{background:#1e3a5f;color:#90caf9}
.cat-nbuna-vocadb{background:#1a3350;color:#64b5f6}
.cat-nbuna-single{background:#1b4332;color:#81c784}
.cat-nbuna-provide{background:#4a2c00;color:#ffb74d}
.cat-nbuna-comp{background:#3e1f5e;color:#ce93d8}
.cat-nbuna-arrange{background:#4a1942;color:#f48fb1}
.cat-nbuna-remix{background:#4a1942;color:#f48fb1}
.cat-nbuna-collab{background:#004d40;color:#80cbc4}
.cat-nbuna-game{background:#4a3800;color:#fff176}
.cat-nbuna-ref{background:#303030;color:#bdbdbd}
.cat-nbuna-other{background:#37474f;color:#b0bec5}
.cat-yorushika{background:#311b5e;color:#b39ddb}
.cat-yorushika-single{background:#3d1f73;color:#d1c4e9}
.cat-yorushika-feat{background:#283593;color:#9fa8da}

/* Status */
.status-badge{display:inline-block;padding:.15rem .45rem;border-radius:3px;font-size:.68rem;font-weight:500}
.status-ok{background:#14532d;color:#86efac}
.status-ng{background:#7f1d1d;color:#fca5a5}
.status-check{background:#713f12;color:#fde68a}
.status-na{background:#303030;color:#9ca3af}

/* Footer */
footer{text-align:center;padding:2rem;color:var(--text3);font-size:.72rem;border-top:1px solid var(--border)}
footer a{color:var(--accent2);text-decoration:none}

/* Responsive */
@media(max-width:768px){
.hero h1{font-size:1.5rem}
.stats-bar{gap:1rem}
.stat-num{font-size:1.3rem}
table{font-size:.78rem}
td,th{padding:.4rem .35rem}
.controls{padding:1rem}
.table-wrap{padding:0 .5rem 2rem}
}
</style>
</head>

</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<footer>
<p>n-buna 全楽曲データベース — ファンメイド・非公式</p>
<p style="margin-top:.3rem">データソース: Wikipedia, VocaDB, Discogs, VGMdb, ボカロDB, Pixiv百科事典, 各公式サイト</p>

"ヨルシカ":"cat-yorushika","ヨルシカ_配信シングル":"cat-yorushika-single","ヨルシカ_参加作品":"cat-yorushika-feat"
};

let sortCol="配信日", sortAsc=false, activeCats=new Set(), activeStatus=new Set(), query="";

function getStatusClass(s){
if(s.startsWith("◯"))return"status-ok";
if(s.startsWith("✕"))return"status-ng";
if(s.startsWith("△"))return"status-check";
return"status-na";
}
function getStatusLabel(s){
if(s.startsWith("◯"))return"◯ 配信あり";
if(s.startsWith("✕"))return"✕ 購入限定";
if(s.startsWith("△"))return"△ 要確認";
if(s.startsWith("対"))return"対象外";
return"不明";
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function render(){
const q=query.toLowerCase();
let filtered=DATA.filter(r=>{
if(activeCats.size&&!activeCats.has(r.カテゴリ))return false;
const sp=r.配信状況.charAt(0);
if(activeStatus.size){
let match=false;
if(activeStatus.has("◯")&&sp==="◯")match=true;
if(activeStatus.has("✕")&&sp==="✕")match=true;
if(activeStatus.has("△")&&sp==="△")match=true;
if(activeStatus.has("他")&&(sp==="対"||!r.配信状況))match=true;
if(!match)return false;
}
if(q){
const hay=(r.曲名+r.ボーカル+r.収録アルバム+r.カテゴリ+r.備考).toLowerCase();
if(!hay.includes(q))return false;
}
return true;
});

filtered.sort((a,b)=>{
let va=a[sortCol]||"",vb=b[sortCol]||"";
if(sortCol==="配信日"){va=va||"9999";vb=vb||"9999"}
const cmp=va.localeCompare(vb,"ja");
return sortAsc?cmp:-cmp;
});

const tbody=document.getElementById("tbody");
tbody.innerHTML=filtered.map(r=>{
const catLabel=CAT_LABELS[r.カテゴリ]||r.カテゴリ;
const catCss=CAT_CSS[r.カテゴリ]||"cat-nbuna-other";
const stCss=getStatusClass(r.配信状況);
const stLabel=getStatusLabel(r.配信状況);
const link=r.リンク?`<a href="${esc(r.リンク)}" target="_blank" rel="noopener">${esc(r.リンク).substring(0,50)}${r.リンク.length>50?"...":""}</a>`:"—";
return`<tr>
<td class="title">${esc(r.曲名)}</td>
<td class="vocal">${esc(r.ボーカル||"—")}</td>
<td class="album">${esc(r.収録アルバム)}</td>
<td class="date">${esc(r.配信日||"—")}</td>
<td class="cat"><span class="cat-badge ${catCss}">${esc(catLabel)}</span></td>
<td class="link">${link}</td>
<td><span class="status-badge ${stCss}">${esc(stLabel)}</span></td>
<td class="src">${esc(r.データソース||"—")}</td>
<td class="note">${esc(r.備考||"")}</td>
</tr>`;
}).join("");

document.getElementById("resultCount").textContent=`${filtered.length} / ${DATA.length} 件表示`;
}

function initFilters(){
const cats=[...new Set(DATA.map(r=>r.カテゴリ))];
const catDiv=document.getElementById("catFilters");
cats.forEach(c=>{
const chip=document.createElement("span");
chip.className="chip";
chip.textContent=CAT_LABELS[c]||c;
chip.onclick=()=>{
if(activeCats.has(c)){activeCats.delete(c);chip.classList.remove("active")}
else{activeCats.add(c);chip.classList.add("active")}
render();
};
catDiv.appendChild(chip);
});

const stDiv=document.getElementById("statusFilters");
[["◯","配信あり"],["✕","購入限定"],["△","要確認"],["他","対象外"]].forEach(([k,l])=>{
const chip=document.createElement("span");
chip.className="chip";
chip.textContent=l;
chip.onclick=()=>{
if(activeStatus.has(k)){activeStatus.delete(k);chip.classList.remove("active")}
else{activeStatus.add(k);chip.classList.add("active")}
render();
};
stDiv.appendChild(chip);
});
}

function initSort(){
document.querySelectorAll("thead th[data-col]").forEach(th=>{
th.onclick=()=>{
const col=th.dataset.col;
if(!col)return;
if(sortCol===col)sortAsc=!sortAsc;
else{sortCol=col;sortAsc=true}
document.querySelectorAll("thead th").forEach(t=>{t.classList.remove("sorted");t.querySelector(".arrow")&&(t.querySelector(".arrow").textContent="▼")});
th.classList.add("sorted");
th.querySelector(".arrow").textContent=sortAsc?"▲":"▼";
render();
};
});
}

function initStats(){
document.getElementById("totalCount").textContent=DATA.length;
document.getElementById("availCount").textContent=DATA.filter(r=>r.配信状況.startsWith("◯")).length;
document.getElementById("limitedCount").textContent=DATA.filter(r=>r.配信状況.startsWith("✕")).length;
}

document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render()});
initFilters();initSort();initStats();render();
</script>
</body>
</html>
